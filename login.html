<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • FCTVE Admissions Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .header-font { font-family: 'Poppins', system-ui, sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            
            <!-- Logo + Header -->
            <div class="flex justify-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-12 h-12">
                        <img src="logo.jpg" alt="FCTVE Logo" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <div class="text-xl font-extrabold text-slate-900 tracking-tighter">FCTVE</div>
                        <div class="text-[10px] text-slate-500 -mt-1">Admissions Portal</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-slate-900">Welcome back</h1>
                    <p class="text-slate-600 mt-2">Sign in to access the Admissions Portal</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="space-y-5">
                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Work Email</label>
                            <input type="email" id="email" value="mpaphi.mahlathini@fctve.ac.bw" required
                                   class="form-input w-full px-4 py-3.5 border border-slate-300 rounded-2xl text-sm">
                        </div>

                        <!-- Password -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                            <div class="relative">
                                <input type="password" id="password" value="demo2026" required
                                       class="form-input w-full px-4 py-3.5 border border-slate-300 rounded-2xl text-sm pr-12">
                                <button type="button" onclick="togglePassword()"
                                        class="absolute right-4 top-4 text-slate-400 hover:text-slate-600">
                                    <i class="fa-solid fa-eye" id="toggle-icon"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember + Forgot -->
                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center gap-x-2 cursor-pointer">
                                <input type="checkbox" checked class="accent-blue-800">
                                <span class="text-slate-600">Remember me</span>
                            </label>
                            <a href="#" class="text-blue-700 hover:underline font-medium">Forgot password?</a>
                        </div>

                        <!-- Submit -->
                        <button type="submit"
                                class="w-full py-4 bg-blue-800 hover:bg-blue-900 transition-all text-white font-bold rounded-3xl flex items-center justify-center gap-x-2 text-sm tracking-wider shadow-lg shadow-blue-800/30 active:scale-[0.985]">
                            <span>SIGN IN</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>

                <!-- Divider -->
                <div class="my-6 flex items-center gap-x-4">
                    <div class="flex-1 h-px bg-slate-200"></div>
                    <span class="text-xs text-slate-400 font-medium">OR</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="text-sm text-slate-600">
                        Don't have an account? 
                        <a href="signup.html" class="font-semibold text-blue-700 hover:underline">Create one here</a>
                    </p>
                </div>
            </div>

            <p class="text-center text-xs text-slate-400 mt-8">
                © 2026 Francistown College of Technical &amp; Vocational Education
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple demo validation
            if (email && password.length >= 4) {
                // Save login state
                const user = {
                    name: "Mpaphi Mahlathini",
                    email: email,
                    role: "Senior Admissions Officer",
                    campus: "Francistown",
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // Redirect to main portal
                window.location.href = 'index.html';
            } else {
                alert("Please enter valid credentials.");
            }
        }

        // Auto-focus email
        window.onload = function() {
            document.getElementById('email').focus();
        }
    </script>
</body>
</html>
