<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile • FCTVE Admissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .header-font { font-family: 'Poppins', system-ui, sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Top Bar -->
    <div class="bg-white border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <a href="index.html" class="flex items-center gap-x-2 text-slate-600 hover:text-slate-900">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span class="font-medium text-sm">Back to Portal</span>
                </a>
            </div>
            <div class="flex items-center gap-x-2 text-sm">
                <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-2xl text-xs font-semibold">Logged in</span>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-6 pt-10 pb-16">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">My Profile</h1>
                <p class="text-slate-600">Manage your admissions officer account</p>
            </div>
            <button onclick="logout()" 
                    class="px-5 py-2.5 text-sm font-semibold flex items-center gap-x-2 text-red-600 hover:bg-red-50 rounded-2xl transition-colors">
                <i class="fa-solid fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Profile Card -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 text-center">
                    <div class="relative w-28 h-28 mx-auto mb-5">
                        <div class="w-28 h-28 rounded-2xl overflow-hidden ring-4 ring-blue-100">
                            <img id="profile-avatar" src="https://i.pravatar.cc/112?img=28" alt="Profile Photo" class="w-full h-full object-cover">
                        </div>
                        <button onclick="changeProfilePhoto()" 
                                class="absolute -bottom-1 -right-1 bg-white border shadow px-2.5 py-1 rounded-xl text-xs flex items-center gap-x-1 hover:bg-slate-50">
                            <i class="fa-solid fa-camera text-blue-700"></i>
                            <span class="text-[10px] font-semibold">Change</span>
                        </button>
                    </div>
                    
                    <div id="profile-name" class="text-2xl font-extrabold text-slate-900"></div>
                    <div id="profile-role" class="text-blue-700 font-semibold mt-0.5"></div>
                    
                    <div class="mt-6 pt-6 border-t">
                        <div class="text-xs text-slate-500">Member since</div>
                        <div id="member-since" class="font-semibold text-slate-700"></div>
                    </div>
                </div>
            </div>

            <!-- Details -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-lg flex items-center gap-x-2">
                            <i class="fa-solid fa-user text-blue-700"></i>
                            <span>Personal Information</span>
                        </h3>
                        <button onclick="toggleEditMode()" id="edit-btn"
                                class="px-5 py-3 text-sm font-semibold bg-blue-800 text-white rounded-2xl flex items-center gap-x-2 hover:bg-blue-900 active:bg-blue-950 transition-all min-w-[140px] justify-center">
                            <i class="fa-solid fa-edit"></i>
                            <span>Edit Profile</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6 text-sm" id="profile-fields">
                        <!-- Populated dynamically by JavaScript -->
                    </div>

                    <div class="mt-8 pt-6 border-t flex gap-x-3" id="action-buttons" style="display: none;">
                        <button onclick="saveProfile()" 
                                class="px-6 py-3 text-sm font-semibold bg-emerald-600 text-white rounded-2xl flex items-center gap-x-2 hover:bg-emerald-700 transition-colors">
                            <i class="fa-solid fa-save"></i>
                            <span>Save Changes</span>
                        </button>
                        <button onclick="cancelEdit()" 
                                class="px-6 py-3 text-sm font-semibold border border-slate-300 rounded-2xl hover:bg-slate-50 transition-colors">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadProfile() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            // Set basic info
            document.getElementById('profile-name').textContent = currentUser.name || 'Admissions Officer';
            document.getElementById('profile-role').textContent = currentUser.role || 'Admissions Officer';
            
            // Set avatar
            const avatar = document.getElementById('profile-avatar');
            if (currentUser.avatar) {
                avatar.src = currentUser.avatar;
            } else if (currentUser.email) {
                avatar.src = `https://i.pravatar.cc/112?u=${currentUser.email}`;
            }
            
            // Member since
            const memberSince = document.getElementById('member-since');
            if (currentUser.loginTime) {
                const date = new Date(currentUser.loginTime);
                memberSince.textContent = date.toLocaleString('default', { month: 'long', year: 'numeric' });
            } else {
                memberSince.textContent = "June 2026";
            }
            
            // Render dynamic fields
            renderProfileFields();
        }

        function editProfile() {
            const newName = prompt("Enter your full name:", document.getElementById('full-name').textContent);
            if (newName) {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                user.name = newName;
                localStorage.setItem('currentUser', JSON.stringify(user));
                location.reload();
            }
        }

        function changeProfilePhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // Max 2MB
                if (file.size > 2 * 1024 * 1024) {
                    alert("File too large. Maximum size is 2MB.");
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    currentUser.avatar = ev.target.result;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    document.getElementById('profile-avatar').src = currentUser.avatar;
                    showToast("Profile photo updated successfully!");
                };
                reader.readAsDataURL(file);
            };
            
            input.click();
        }

        function changePassword() {
            const newPass = prompt("Enter new password (demo):");
            if (newPass) showToast("Password changed successfully! (Demo mode)");
        }

        function logout() {
            if (confirm("Are you sure you want to log out?")) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-lg flex items-center gap-x-2 z-50`;
            toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> <span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
