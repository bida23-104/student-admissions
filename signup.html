<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account • FCTVE Admissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .header-font { font-family: 'Poppins', system-ui, sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-12 h-12">
                        <img src="logo.jpg" alt="FCTVE Logo" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <div class="text-xl font-extrabold text-slate-900 tracking-tighter">FCTVE</div>
                        <div class="text-[10px] text-slate-500 -mt-1">Admissions Portal</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
                <div class="text-center mb-7">
                    <h1 class="text-3xl font-extrabold text-slate-900">Create Account</h1>
                    <p class="text-slate-600 mt-2">Join the FCTVE Admissions Team</p>
                </div>

                <form id="signup-form" onsubmit="handleSignup(event)">
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">First Name</label>
                                <input type="text" id="first-name" value="Thabo" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Surname</label>
                                <input type="text" id="surname" value="Molefe" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Work Email</label>
                            <input type="email" id="email" value="thabo.molefe@fctve.ac.bw" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Employee ID</label>
                            <input type="text" id="employee-id" value="FCTVE-2026-0192" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm font-mono">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                            <input type="password" id="password" value="demo2026" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm">
                            <p class="text-xs text-slate-500 mt-1">Minimum 6 characters</p>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm Password</label>
                            <input type="password" id="confirm-password" value="demo2026" required class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm">
                        </div>

                        <button type="submit"
                                class="w-full mt-2 py-4 bg-blue-800 hover:bg-blue-900 transition-all text-white font-bold rounded-3xl flex items-center justify-center gap-x-2 text-sm tracking-wider shadow-lg shadow-blue-800/30">
                            <span>CREATE ACCOUNT</span>
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center text-sm text-slate-600">
                    Already have an account? 
                    <a href="login.html" class="font-semibold text-blue-700 hover:underline">Sign in here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleSignup(e) {
            e.preventDefault();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Creating account...`;
            btn.disabled = true;
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                alert("Passwords do not match!");
                return;
            }
            
            if (password.length < 6) {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                alert("Password must be at least 6 characters long.");
                return;
            }
            
            setTimeout(() => {
                const user = {
                    name: document.getElementById('first-name').value + " " + document.getElementById('surname').value,
                    email: document.getElementById('email').value,
                    employeeId: document.getElementById('employee-id').value,
                    role: "Admissions Officer",
                    campus: "Francistown",
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Account Created!`;
                
                setTimeout(() => {
                    alert("Account created successfully! Welcome aboard.");
                    window.location.href = 'index.html';
                }, 700);
            }, 1300);
        }
    </script>
</body>
</html>
